<title>Mátra Hard Trail – korábbi verzió</title>
<style>
:root{--navy:#102a49;--deep:#0b1d33;--teal:#19a2a8;--pale:#e8f7f8;--line:rgba(255,255,255,.22)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,var(--navy),var(--deep));color:#fff}.card{width:min(560px,calc(100% - 28px));border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.08));box-shadow:0 22px 60px rgba(0,0,0,.28);padding:24px}.kicker{display:inline-flex;border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:8px 12px;font-weight:900;font-size:12px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.08)}h1{margin:14px 0 8px;font-size:clamp(30px,6vw,48px);letter-spacing:-.045em;line-height:1}.muted{color:rgba(255,255,255,.72);line-height:1.5}.btn{display:inline-block;margin-top:12px;border-radius:14px;background:var(--teal);color:#fff;text-decoration:none;font-weight:900;padding:11px 14px}.creator-credit{max-width:min(1100px,calc(100% - 24px));margin:18px auto 8px;padding:8px 0 2px;text-align:center;font-size:11px;line-height:1.35;font-weight:600;color:rgba(255,255,255,.50);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}@media print{.creator-credit{display:none!important}}
</style>
</head>
<body>
<main class="card">
  <div class="kicker">#HARDTRAIL: Mátra</div>
  <h1>Ez egy korábbi verzió.</h1>
  <p class="muted">A játék jelenlegi stabil alapverziója az Alapjáték felületen fut. Pár másodperc múlva automatikusan oda irányítunk.</p>
  <a class="btn" href="matra-v3.html">Tovább az Alapjátékra</a>
  <footer class="creator-credit">Készítette: Budai Máté, 2026. Hajrá, Fradi!</footer>
</main>
</body>
