name: Fix feedback workflow

on:
  workflow_dispatch:
  push:
    paths:
      - 'FIX_FEEDBACK_WORKFLOW_TRIGGER.md'
      - '.github/workflows/fix-feedback-workflow.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch validation string
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/enhance-feedback-logic.yml')
          s=p.read_text(encoding='utf-8')
          old="'A döntés iránya valószínűleg túl korán rögzült'"
          new="'Úgy látszik, a döntés iránya elég korán megszületett'"
          if old not in s:
              print('Old validation string not found; checking if already patched.')
          else:
              s=s.replace(old,new)
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No workflow patch needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/enhance-feedback-logic.yml
          git commit -m "Fix feedback workflow validation string"
          git push
