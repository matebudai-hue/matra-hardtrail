name: Update Matra reports and feedback

on:
  workflow_dispatch:
  push:
    paths:
      - 'PDF_REPORT_TRIGGER.md'

permissions:
  contents: write

jobs:
  update-matra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply targeted fixes
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import tempfile

          repo = Path('.')
          base = repo / 'matra-v3.html'
          leader = repo / 'matra-leader.html'
          credit = 'Készítette: Budai Máté, 2026. Hajrá, Fradi!'

          def read(path):
              return path.read_text(encoding='utf-8')

          def write(path, text):
              path.write_text(text, encoding='utf-8')

          def replace_exact(text, old, new, label):
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f'Missing expected block for {label}')
              return text.replace(old, new, 1)

          def replace_between(text, start, end, replacement, label):
              if replacement in text:
                  return text
              pattern = re.escape(start) + r'.*?' + re.escape(end)
              new_text, n = re.subn(pattern, replacement + end, text, count=1, flags=re.S)
              if n != 1:
                  raise SystemExit(f'Could not replace {label}')
              return new_text

          base_feedback = """function feedback(c){if(!complete().ok)return{g:'Még nincs elég adat ahhoz, hogy értelmes mintázatot mutassunk.',p:'Töltsd ki a közös döntést, a közös top 6-ot és mind a 12 kérdést.',f:'A visszajelzés akkor lesz használható, ha a döntési folyamat is látszik, nem csak a végeredmény.'};let g,p,f;const early=S.q[6]<=3,weakArgs=S.q[7]<=3,quietWeak=S.q[8]<=3||S.q[9]<=3,strongRisk=c.risk>=4.7,strongProcess=c.process>=4.5,strongGroup=c.group>=4.5;if(early&&weakArgs)g='A döntés iránya valószínűleg túl korán rögzült. A kapott adatok alapján a csoport inkább egy gyorsan kialakuló irányhoz rendezhette az érveket, miközben az érvek és a hangerő aránya is kérdéses maradt.';else if(early)g='A döntés iránya valószínűleg túl korán rögzült. Érdemes ránézni, hogy az információk valóban alakították-e az irányt, vagy inkább a már kialakult döntést támasztották alá.';else if(quietWeak)g='A kapott adatok alapján a csoport gondolkodott a helyzetről, de a csendesebb vagy óvatosabb szempontok nem kaptak elég súlyt. Ilyenkor a döntés tartalma akár jó is lehet, a folyamat mégis sérülékeny.';else if(strongRisk&&strongProcess&&strongGroup)g='A kapott adatok alapján a csoport több kockázatot mérlegelt, az információk érdemben alakították az irányt, és a vélemények nagy része be tudott kerülni a közös döntésbe.';else g='A kapott adatok alapján a csoport több használható elemet is bevont a döntésbe, de nem minden ponton látszik ugyanilyen erősnek a mérlegelés, az érvek súlya és a vélemények bevonása.';if(c.same<=2&&S.q[10]>=4&&S.q[11]>=4)p='A saját első top 6-od és a közös top 6 között kevés egyezés látszik, mégis tudsz azonosulni a döntéssel, és a saját szempontjaid is megjelentek. Ez valódi elmozdulást és tanulást jelezhet a közös gondolkodásban.';else if(c.same<=2&&S.q[10]>=4)p='A saját első gondolkodásod eltért a közös iránytól, mégis tudsz azonosulni a végső döntéssel. Úgy tűnik, a csoport érvei elmozdítottak az első álláspontodtól.';else if(c.same>=4&&S.q[10]<=3)p='A tárgyválasztásod közel volt a közös döntéshez, belül mégsem állsz teljesen mögötte. Ilyenkor gyakran a döntés módja okoz feszültséget, nem maga a tartalom.';else if(S.q[11]<=3)p='A válaszaid alapján jelen voltál a döntésben, de nem minden fontos szempontod jutott be a közös irányba. Érdemes megnézni, mit mondtál ki, mit engedtél el, és mi maradt benned.';else if(S.q[10]<=3)p='A közös döntés számodra csak részben vállalható. Ez arra utalhat, hogy volt benned fenntartás, vagy nem érezted teljesen sajátodnak a végső irányt.';else p='A válaszaid alapján aktívan kapcsolódtál a közös döntéshez: a saját szempontjaid megjelentek, és a végső iránnyal is tudsz azonosulni.';if(early)f='A továbbvihető kérdés most az, hogy mikor dőlt el az irány: valódi mérlegelés után, vagy egy korán kialakult döntéshez kerestetek érveket.';else if(weakArgs||quietWeak)f='A legérdekesebb tanulság most az lehet, hogy mi kapott valódi súlyt: az érvek, a határozottság, vagy azok a halkabb szempontok, amelyek elsőre könnyen háttérben maradnak.';else if(c.same<=2)f='A legjobb beszélgetés most abból indulhat, hogy mi változott a saját első gondolkodásod és a közös döntés között.';else f='A következő beszélgetésben azt érdemes megfogni, pontosan melyik információ, érv vagy vélemény fordította a döntést a végső irányba.';return{g,p,f}}
"""

          leader_feedback = """function fb(){const r=report();let decision,leader,personal;const early=S.q[3]<=3,weakRisk=S.q[0]<=3||S.q[1]<=3||S.q[2]<=3,startedAlone=S.q[4]>=4,leaderReset=S.q[5]<=3,infoWeak=S.q[6]<=3,leaderFocusWeak=S.q[7]<=3,ownWeak=S.q[8]<=3,ownImpactWeak=S.q[9]<=3,listeningWeak=S.q[10]<=3,identifyWeak=S.q[11]<=3;decision=byLevel(r.dAvg,'A döntési folyamatban erősen megjelent a kockázatok, az információk és a körülmények mérlegelése. A csoport nagy eséllyel nem csak gyors választ keresett, hanem próbálta érteni is a helyzetet.','A döntési folyamatban volt mérlegelés, de néhány ponton valószínűleg gyorsabban záródott az irány, mint amennyire a helyzet indokolta volna. Érdemes megnézni, mely információk kaptak túl nagy vagy túl kicsi súlyt.','A döntési folyamat inkább gyors iránykeresésnek tűnik, mint alapos kockázatmérlegelésnek. Ilyenkor könnyen előbb születik meg a válasz, és utána kezdi a csoport hozzáigazítani az érveket.');if(early)decision='A döntés iránya valószínűleg túl korán rögzült. A válaszaid alapján érdemes megnézni, hogy az információk alakították-e a stratégiát, vagy a stratégia után rendeztétek hozzá az információkat.';else if(weakRisk)decision='A döntésben volt közös gondolkodás, de a kockázatok vagy az információk egy része kisebb súlyt kaphatott. Ilyenkor a választott irány akár működőképes is lehet, a döntési alap mégis billeg.';if(leaderReset&&infoWeak)leader='A vezető visszatérése a válaszaid alapján erősen átrendezhette a csoport addigi gondolkodását, miközben a nála lévő plusz információk sem feltétlenül tisztították a helyzetet. Ez a verzió egyik legerősebb tanulási pontja.';else if(leaderReset)leader='A vezető visszatérése után az addig elhangzott szempontok egy része háttérbe szorulhatott. Itt érdemes megnézni, a csoport mennyire tudta megtartani a saját gondolkodását.';else if(infoWeak)leader='A vezető visszatért, de a nála lévő plusz információk a válaszaid alapján nem feltétlenül segítették eléggé a tisztább döntést. A kérdés az, hogy információként vagy tekintélyként jelentek-e meg.';else if(leaderFocusWeak)leader='A vezető jelenléte nem teljesen tartotta a fókuszt a jelenlegi helyzet kockázatain. Ilyenkor könnyen előkerül a korábbi döntés igazolása vagy a felelősség kérdése.';else if(startedAlone)leader='A csoport a vezető távollétében is elindította a közös gondolkodást, és a vezető visszatérése a válaszok alapján inkább hozzáadott ehhez, mint lenullázta.';else leader=byLevel(r.lAvg,'A vezető visszatérése a válaszaitok alapján segítette a csoportot: nem törölte el az addigi gondolkodást, hanem hozzáadott a közös döntéshez.','A vezető visszatérésének hatása vegyesnek látszik. Volt, amiben segíthetett, de érdemes ránézni, mi történt az addig kialakult csoportdinamikával, amikor visszajött.','A vezető visszatérése a válaszaitok alapján inkább bizonytalanságot vagy igazodást hozhatott, mint tisztább döntési folyamatot.');if(ownWeak&&ownImpactWeak)personal='A válaszaid alapján inkább követted a folyamatot, mint alakítottad. Ez nem hiba, de pontos tükör: nyomás alatt könnyű visszahúzódni, főleg akkor, ha a vezető visszatérése átírja a csoportteret.';else if(ownImpactWeak)personal='Kimondhattál fontos szempontokat, de ezek nem hatottak elég erősen a közös döntésre. A személyes tanulság itt az lehet, hogyan lehet egy szempontot úgy képviselni, hogy be is épüljön.';else if(listeningWeak)personal='A saját hatásod megjelent, de mások eltérő érveire kevésbé tudtál nyitva maradni. Ez különösen vezetői helyzetben érdekes, mert a csoport ilyenkor egyszerre figyel rád és igazodik hozzád.';else if(identifyWeak)personal='A végső döntéssel csak részben tudsz azonosulni. Érdemes megnézni, hogy a tartalommal volt bajod, vagy azzal, ahogyan a döntés megszületett.';else personal=byLevel(r.pAvg,'A saját szereped aktívnak látszik: kimondtad a fontos szempontjaidat, figyeltél másokra, és a végső döntés mögé is oda tudsz állni.','A saját szereped részben megjelent, de nem biztos, hogy minden fontos szempontod ténylegesen hatott a döntésre. Érdemes végiggondolni, hol maradt benned valami.','A válaszaid alapján inkább benne voltál a folyamatban, mint alakítottad azt. Ez nem hiba, de jó tükör: nyomás alatt könnyű figyelőből követővé válni.');let qs=[];if(early)qs.push('Mikor alakult ki a döntés iránya, és mi történt utána az információkkal?');if(leaderReset||infoWeak)qs.push('Mi változott a csoportban abban a pillanatban, amikor a vezető visszatért?');if(ownImpactWeak)qs.push('Melyik saját szempontod nem hatott úgy a közös döntésre, ahogy szeretted volna?');if(identifyWeak)qs.push('Mi kellett volna ahhoz, hogy jobban mögé tudj állni a végső döntésnek?');if(!qs.length&&r.dAvg>=4.8&&r.lAvg>=4.8&&r.pAvg>=4.8)qs.push('Mi segített abban, hogy a csoport vezetővel és vezető nélkül is tudott gondolkodni?');if(qs.length<2)qs.push('Mit tanultál arról, hogyan hat rád egy visszatérő vezető jelenléte bizonytalan helyzetben?');if(qs.length<2)qs.push('Mit csinálnál másképp egy következő hasonló döntési helyzetben?');return{decision,leader,personal,qs:qs.slice(0,2)}}
"""

          # Alapjáték: indexlogika és visszajelzés
          text = read(base)
          text = replace_exact(
              text,
              "processScore=Math.round(S.q.reduce((a,b)=>a+b,0)/72*70)",
              "processScore=Math.round(S.q.reduce((a,b)=>a+(b?((b-1)/5):0),0)/12*70)",
              'base process score normalization'
          )
          text = replace_exact(
              text,
              "a.push('Úgy tűnhet, hogy előbb született irány, és az érvek csak utána igazodtak hozzá.')",
              "a.push('A döntés iránya valószínűleg túl korán rögzült: előbb születhetett irány, és az érvek csak utána igazodtak hozzá.')",
              'base risk wording'
          )
          text = replace_between(text, 'function feedback(c){', 'function reflect(c){', base_feedback, 'base feedback')
          write(base, text)

          # Vezetői verzió: személyre szabottabb visszajelzés
          text = read(leader)
          text = replace_between(text, 'function fb(){', 'function verdict', leader_feedback, 'leader feedback')
          write(leader, text)

          # Biztonsági ellenőrzés: HTML/JS szerkezet, kulcselemek, régi hiba hiánya
          checks = {
              'matra-v3.html': [
                  "processScore=Math.round(S.q.reduce((a,b)=>a+(b?((b-1)/5):0),0)/12*70)",
                  'A döntés iránya valószínűleg túl korán rögzült',
                  'pOwnStrategy','pTeamStrategy','pOwnTop','pTeamTop','pQRows',
                  'Skála: 1 = egyáltalán nem, 6 = teljesen', credit,
                  'Nem a hó volt az igazi veszély.'
              ],
              'matra-leader.html': [
                  'A vezető visszatérése a válaszaid alapján erősen átrendezhette',
                  'pOwnStrategy','pTeamStrategy','pOwnTop','pTeamTop','pQRows',
                  'Skála: 1 = egyáltalán nem, 6 = teljesen', credit,
                  'Nem a hó volt az igazi veszély.'
              ],
          }
          for path, needles in checks.items():
              content = read(repo / path)
              missing = [n for n in needles if n not in content]
              if missing:
                  raise SystemExit(f'{path}: missing {missing}')
              if content.count('<section id="print" class="hide">') != 1:
                  raise SystemExit(f'{path}: wrong print section count')
              if 'processScore=Math.round(S.q.reduce((a,b)=>a+b,0)/72*70)' in content:
                  raise SystemExit(f'{path}: old processScore logic remains')

              script = content.split('<script>',1)[1].rsplit('</script>',1)[0]
              tmp = tempfile.NamedTemporaryFile('w', suffix='.js', delete=False, encoding='utf-8')
              tmp.write(script)
              tmp.close()
              subprocess.run(['node','--check',tmp.name], check=True)

          print('Targeted Matra fixes applied and validated.')
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matra-v3.html matra-leader.html
          git commit -m "Improve Matra feedback logic safely"
          git push
