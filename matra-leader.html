<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mátra Hardtrail – A vezető visszatér</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(180deg,#102a49,#0b1d33);color:#fff;min-height:100vh;display:grid;place-items:center}.loading{width:min(560px,calc(100% - 32px));background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:24px;padding:22px;box-shadow:0 20px 55px rgba(0,0,0,.22)}.loading b{display:block;font-size:24px;margin-bottom:6px}.loading span{color:rgba(255,255,255,.75);line-height:1.45}
</style>
</head>
<body>
<div class="loading"><b>Mátra Hardtrail – A vezető visszatér</b><span>Betöltés...</span></div>
<script>
(async()=>{
  const source='https://raw.githubusercontent.com/matebudai-hue/matra-hardtrail/fd6b70f280e06a53275dde3fe5dacfee60913c86/matra-leader.html';
  const css='<style>.creator-credit{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:99999;pointer-events:none;font-size:11px;line-height:1.2;font-weight:700;color:rgba(16,42,73,.62);background:rgba(255,255,255,.76);border:1px solid rgba(16,42,73,.10);border-radius:999px;padding:4px 10px;box-shadow:0 8px 24px rgba(0,0,0,.08);backdrop-filter:blur(6px);max-width:calc(100% - 20px);white-space:nowrap}@media print{.creator-credit{display:none!important}}</style>';
  const credit='<div class="creator-credit">Készítette: Budai Máté, 2026. Hajrá, Fradi!</div>';
  try{
    const response=await fetch(source,{cache:'no-store'});
    if(!response.ok) throw new Error(String(response.status));
    let html=await response.text();
    html=html.replace('</head>',css+'</head>').replace('</body>',credit+'</body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML='<div class="loading"><b>Nem sikerült betölteni az oldalt.</b><span>Frissíts rá az oldalra. Ha továbbra sem megy, nézd meg a GitHub Pages beállítást.</span></div>';
  }
})();
</script>
</body>
</html>
